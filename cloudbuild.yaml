steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/qwen3-tts/server:latest'
      - '.'
    timeout: '1800s'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/qwen3-tts/server:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 50
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
