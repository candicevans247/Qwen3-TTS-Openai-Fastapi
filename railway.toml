[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
dockerBuildTarget = "cpu-base"

[deploy]
startCommand = "mkdir -p /tmp/huggingface && chmod 777 /tmp/huggingface && rm -rf /tmp/huggingface/tmp* && python -m api.main"
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
